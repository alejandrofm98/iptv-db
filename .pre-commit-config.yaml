# .pre-commit-config.yaml
# Pre-commit hooks for quality gates before commit
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# mypy incluido porque pyproject.toml tiene strict = true y el
# codebase es pequeno (modelos y DTOs), lo que lo hace rapido.

repos:
  # Standard hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key

  # Ruff (format + lint)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ['--fix', '--exit-non-zero-on-fix']
      - id: ruff-format

  # mypy (type checking) — strict config en pyproject.toml
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: ['--config-file=pyproject.toml']
        additional_dependencies: []

  # gitleaks (secret detection)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
